# 服务器配置
server:
  port: 8080      # 运行端口
  mode: debug     # 运行模式：debug (开发模式) / release (生产模式)

# PostgreSQL数据库配置
database:
  host: 127.0.0.1                     # 数据库地址
  port: 5432                          # 数据库端口
  user: your_db_user                  # 数据库用户名
  password: your_db_password          # 数据库密码
  dbname: im_chat                     # 数据库名称
  sslmode: disable                    # SSL模式：disable / enable
  timezone: Asia/Shanghai             # 时区

# JWT鉴权配置
jwt:
  secret: your-secret-key-change-in-production  # JWT签发密钥，生产环境请务必修改
  expire: 720h                                  # 令牌过期时间，如：72h, 30d

# 文件上传配置
upload:
  path: ./uploads     # 文件本地存储路径
  max_size: 10        # 允许上传的最大文件大小(MB)

# 发送邮件服务配置 (用于发送注册/找回密码验证码)
email:
  enable: false                           # 是否开启邮件发送：false为仅打印日志不真发(测试用)，true为真实发送邮件
  host: smtp.example.com                  # SMTP服务器地址，如QQ邮箱为: smtp.qq.com
  port: 465                               # SMTP服务器端口，比如开启SSL/TLS时通常为 465
  username: your_email@example.com        # SMTP鉴权用户名 (发件邮箱)
  password: your_email_auth_code_or_password # SMTP鉴权密码或授权码
  from_name: 实时通讯                     # 发件人显示名称
